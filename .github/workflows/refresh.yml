name: Refresh growth metrics

on:
  schedule:
    - cron: "0 14 * * *"  # 14:00 UTC daily
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Refresh metrics
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python scripts/refresh.py

      - name: Commit if changed
        run: |
          if git diff --quiet data/growth-metrics.csv; then
            echo "CSV unchanged; skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/growth-metrics.csv
          git commit -m "refresh metrics ($(date -u +%Y-%m-%d))"
          git push
